spring.application.name=JavaLab
server.port=9090

spring.datasource.url=jdbc:postgresql://localhost:5432/binance?currentSchema=public
spring.datasource.username=postgres
spring.datasource.password=sa



spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=SpringBootHikariCP

spring.batch.jdbc.initialize-schema=always


logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.username=admin
spring.activemq.password=admin

# ======================================================
# JMS Configuration
# ======================================================
# Bat pub/sub (Topic) - QUAN TRONG!
spring.jms.pub-sub-domain=false
# false = Queue mode (default)
# true = Topic mode

# Tu dong tao destination neu chua ton tai
spring.activemq.packages.trust-all=true

# Queue & Topic names (best practice: d¨ng constant)
app.jms.queue.order=order.queue
app.jms.topic.notification=notification.topic

# ======================================================
# Connection Pool (Production Best Practice)
# ======================================================

spring.activemq.pool.enabled=true
spring.activemq.pool.max-connections=10
spring.activemq.pool.idle-timeout=30000

springdoc.swagger-ui.path=/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.show-actuator=true